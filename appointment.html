<form>

<fieldset>

<legend>Appointment Form</legend>

<label>Full Name:</label><br>
<input type="text" placeholder="Enter your full name" required><br><br>

<label>Email:</label><br>
<input type="email" placeholder="Enter your email" required><br><br>

<label>Phone Number:</label><br>
<input type="tel" placeholder="Enter your phone number" required><br><br>

<label>Gender:</label><br>
<input type="radio" name="gender"> Male
<input type="radio" name="gender"> Female
<br><br>

<label>Department:</label><br>
<select required>
    <option>General Medicine</option>
    <option>Surgery</option>
    <option>Pediatrics</option>
    <option>Laboratory</option>
    <option>Emergency</option>
</select><br><br>

<label>Appointment Date:</label><br>
<input type="date" required><br><br>

<label>Appointment Time:</label><br>
<input type="time" required><br><br>

<label>Message:</label><br>
<textarea rows="5" cols="40" placeholder="Write your message"></textarea><br><br>

<input type="submit" value="Book Appointment">

</fieldset>

</form>
